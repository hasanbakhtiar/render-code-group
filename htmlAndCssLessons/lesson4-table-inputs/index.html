<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <!--
    table - <table></table>
    table head - <thead></thead>
    table body - <tbody></tbody>
    table foot - <tfoot></tfoot>
    table data - <td></td>
    table row  - <tr></tr>
    -->

    <table border="1">
        <thead>
            <tr>
                <th>Row</th>
                <th>Photo</th>
                <th>Name</th>
                <th>Surname</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td><img width="70" src="https://i.ytimg.com/vi/Jjt8KLHuJ6A/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLAUAh53OYKpdi_SUT-ayLcfWNKWvg" alt="photo"></td>
                <td>Arthur</td>
                <td rowspan="2">Morgan</td>
                <td>39</td>
            </tr>
            <tr>
                <td>2</td>
                <td><img width="70" src="https://64.media.tumblr.com/73a5fdf640cc7ef8fecc54e6819719bb/72ffe545a541d10a-26/s540x810/ce25f5d972a36f0df5f93f9b2d1fb62eb7db0832.gif" alt="photo"></td>
                <td>Sedie</td>
                <td>38</td>
            </tr>
            <tr>
                <td>3</td>
                <td><img width="70" src="https://i.redd.it/04x6r6sig7pc1.jpeg" alt="photo"></td>
                <td colspan="2">Dutch</td>
                <td>41</td>
            </tr>
        </tbody>
       
    </table>


</body>

</html>
