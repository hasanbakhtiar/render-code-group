    <fieldset>
        <legend>Register Form</legend>
        <form>
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Enter name" required>

            <label for="surname">Surname</label>
            <input id="surname" type="text" placeholder="Enter surname">

            <br><br>

            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter email">


            <label for="tel">Phone</label>
            <input id="tel" type="tel" placeholder="Enter tel">

            <br><br>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender">

            <label for="female">Female</label>
            <input type="radio" id="female" name="gender">
            <br><br>


            <label for="password-one">Password</label>
            <input type="password" id="password-one" minlength="5" maxlength="20">

            <label for="password-tow">Confirm password</label>
            <input type="password" id="password-tow">
            <br><br>

            <textarea name="" id="" cols="40" rows="5"></textarea>
            <br><br>

            <button>Send</button>
