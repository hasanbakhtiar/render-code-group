<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            position: relative;
            width: 300px;
            height: 500px;
            border: 2px solid #000;
            overflow: hidden;
            img{
                transition: .5s;
                top: 0;
                position: absolute;
                object-fit: cover;
            }
        }
        .card:hover{
            .hidden{
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    


    <div class="card">
        <img  width="300" height="500" src="https://hips.hearstapps.com/hmg-prod/images/bright-forget-me-nots-royalty-free-image-1677788394.jpg?crop=0.535xw:1.00xh;0.359xw,0" alt="">
        <img class="hidden" width="300" height="500" src="https://img.freepik.com/premium-photo/flowers-many-colors-floating-water-basin_69709-1340.jpg" alt="">
    </div>
    
    
    


    <!-- <script>

    <script src="./js/script.js"></script>
</body>
</html>
